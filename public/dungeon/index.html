<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://fonts.googleapis.com/css?family=Tillana:600" rel="stylesheet">
    <link href="main.css" type="text/css" rel="stylesheet">
    <title>DUNGEON</title>
</head>
<body>
    <div class="wrapper">
        <div class="instructions"></div>
        <div class=timer><h2></h2></div>
        <div class="game-area">
            <div class="grid"></div>
            <div class="dpad">
            <button class="dpad-btn" id="dpad-up">▲</button>
            <div class="dpad-middle-row">
                <button class="dpad-btn" id="dpad-left">◀</button>
                <div class="dpad-center"></div>
                <button class="dpad-btn" id="dpad-right">▶</button>
            </div>
            <button class="dpad-btn" id="dpad-down">▼</button>
            <button class="dpad-btn dpad-attack" id="dpad-attack">⚔ Attack</button>
            </div>
        </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
